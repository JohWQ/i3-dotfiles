[[block]]
block = "sound"
driver = "auto"
format = "$icon {$volume.eng(w:2) |}"
#format = " $icon { $volume|} "
max_vol = 250
[block.mappings]
"alsa_output.pci-0000_00_1f.3.pro-output-0" = "Speakers"
[[block.click]]
button = "left"
cmd = "pavucontrol"
#cmd="/usr/bin/pulsemixer"

[[block]]
block = "weather"
#format = "$icon  $temp "
format = "$icon  $temp $wind m/s "
#format = ""
format_alt = "$icon  om 12 timer: {$temp_favg ({$temp_fmin}-{$temp_fmax})|Unavailable} "
[block.service]
name = "metno"
coordinates = ["59.9125115", "10.747012"] # Oslo
lang = "nb"

[[block]]
block = "time"
interval = 60
format = "$icon $timestamp.datetime(f:'%d/%m - %R') "
#[[block.click]]
#button = "left"
#cmd=""
[block.theme_overrides]
idle_bg = "#1f2633"

[[block]]
block = "menu"
#text = "\uf40e "
text = "󰵆 "
[[block.items]]
display = " &gt; Apps &lt;"
cmd = "rofi -combi-modi drun -show combi -modi combi -show-icons"
[[block.items]]
display = " &gt; Windows &lt;"
cmd = "rofi -show window -modi window -show-icons"
[[block.items]]
display = " &gt; Clipboard &lt;"
cmd = "rofi -modi 'clipboard:greenclip print' -show clipboard -run-command '{cmd}'"
#[[block.items]]
#display = " &gt; Settings &lt;"# & " &gt; bruh &lt;"
[block.theme_overrides]
idle_bg = "#1f2633"
#[[block.items]]
#display = "󰵆 "
#cmd = ":"

[[block]]
block = "menu"
text = "\uf011  "
[[block.items]]
display = " &gt;  Lock  &lt; "
cmd = "~/.config/scripts/i3status-rs_lock.sh"
[[block.items]]
display = " &gt;  Suspend  &lt; "
cmd = "~/.config/scripts/i3status-rs_suspend.sh"
[[block.items]]
display = " &gt;  Exit  &lt; "
cmd = "~/.config/scripts/i3status-rs_exit.sh"
[[block.items]]
display = " &gt;  Reboot  &lt; "
cmd = "~/.config/scripts/i3status-rs_reboot.sh"
[[block.items]]
display = " &gt;  Shutdown  &lt; "
cmd = "~/.config/scripts/i3status-rs_poweroff.sh"
[block.theme_overrides]
idle_bg = "#1f2633"
