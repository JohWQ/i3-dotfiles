icons_format = "{icon}"

[theme]
theme = "nord-dark"
#theme = "modern"
#theme = "solarized-dark"
#theme = "slick"
#[theme.overrides]
#separator = ""
#idle_bg = "#222222" #bar color
#idle_fg = "#abcdef" #text color

[icons]
icons = "awesome4"
#[icons.overrides]
#cpu = " "
#memory = ""

[[block]]
block = "focused_window"
[block.format]
short = " $title.str(max_w:14) |"
full = " $title.str(max_w:32) |"

[[block]]
block = "music"
player = ["YoutubeMusic", "strawberry", "fooyin"]
interface_name_exclude = ["kdeconnect", "mpd"]
[block.format]
full = " $icon {$combo.str(max_w:20) $play $next |}"
short = " $icon {$combo.str(max_w:12) $play $next |}"

